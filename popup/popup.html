<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Visual Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="4" fill="#D97706"/>
            <path d="M8 9h8M8 12.5h8M8 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="title">Visual Editor</span>
          <span class="subtitle">HTML 可视化编辑</span>
        </div>
      </div>
      <span class="version">v2.0</span>
    </div>

    <div class="popup-body">
      <!-- 编辑模式切换 -->
      <button id="btn-toggle-editor" class="btn btn-primary btn-large">
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>开启编辑模式</span>
      </button>

      <!-- 文件操作 -->
      <div class="control-group">
        <div class="group-label">文件</div>
        <div class="btn-row">
          <button id="btn-open-file" class="btn btn-ghost">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            打开
          </button>
          <button id="btn-save-file" class="btn btn-ghost" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17,21 17,13 7,13 7,21"/>
              <polyline points="7,3 7,8 15,8"/>
            </svg>
            保存
          </button>
          <button id="btn-save-as" class="btn btn-ghost" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7,10 12,15 17,10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            另存
          </button>
        </div>
      </div>

      <!-- 快捷键提示 -->
      <div class="shortcuts-section">
        <div class="group-label">快捷键</div>
        <div class="shortcut-list">
          <div class="shortcut-item"><kbd>⌘S</kbd><span>保存</span></div>
          <div class="shortcut-item"><kbd>⌘Z</kbd><span>撤销</span></div>
          <div class="shortcut-item"><kbd>⌘⇧Z</kbd><span>重做</span></div>
          <div class="shortcut-item"><kbd>Del</kbd><span>删除</span></div>
          <div class="shortcut-item"><kbd>Esc</kbd><span>取消选中</span></div>
          <div class="shortcut-item"><kbd>双击</kbd><span>编辑文本</span></div>
        </div>
      </div>

      <!-- 状态信息 -->
      <div class="status-bar" id="status-bar">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">编辑器未激活</span>
        </div>
        <span class="file-name" id="file-name"></span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
